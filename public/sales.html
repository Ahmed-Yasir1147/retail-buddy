<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retail System — Sales</title>
  <!-- It is required because html2pdf can't read external css-->
  <style>
    #receipt_hider {
      position: fixed;
      left: -10000px;
      top: 0;
    }

    #receipt_template {
      font-family: Arial, sans-serif;
      width: 300px;
      min-height: 400px;
      padding: 28px 24px;
      background-color: #ffffff;
      box-sizing: border-box;

    }

    .receipt_title {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #1a202c;
      margin-bottom: 4px;
      text-align: center;
    }

    .receipt_datetime {
      font-size: 0.75rem;
      color: #718096;
      text-align: right;
      margin-bottom: 10px;
    }

    /* ─── Table ─── */
    .receipt_table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 5px;
    }

    .receipt_table thead tr {
      border-top: 1.5px solid #1a202c;
      border-bottom: 1.5px solid #1a202c;
    }

    .receipt_table thead th {
      font-size: 0.78rem;
      font-weight: 700;
      color: #1a202c;
      padding: 7px 4px;
      text-align: left;
    }

    .receipt_table thead th:last-child,
    .receipt_table tbody td:last-child {
      text-align: right;
    }

    .receipt_table thead th:nth-child(2),
    .receipt_table tbody td:nth-child(2) {
      text-align: center;
    }

    .receipt_table tbody tr:last-child {
      border-bottom: 1.5px solid #1a202c;
      margin-bottom: 8px;
    }

    .receipt_table tbody td {
      font-size: 0.78rem;
      color: #2d3748;
      padding: 7px 4px;
    }

    /* Footer */

    .receipt_total {
      padding-top: 4px;
      padding-bottom: 4px;
    }

    .receipt_total_label {
      font-size: 0.85rem;
      font-weight: 700;
      color: #1a202c;
      
    }

    .receipt_total_value {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1a202c;
      text-align: right;
    }

    .receipt_footer {
      border-bottom: 1.5px solid #1a202c;
    }
  </style>
  <link rel="stylesheet" href="css/style.css" />
  <!-- html2pdf for receipt generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="javascript/sales.js" type="module" defer></script>

</head>



<body>

  <!-- RECEIPT TEMPLATE -->

  <div id="receipt_hider">
    <div id="receipt_template">

      <h1 class="receipt_title">Retail Buddy</h1>

      <p class="receipt_datetime" id="receipt_datetime">24 May 2026 — 14:35</p>

      <table class="receipt_table">
        <thead>
          <tr>
            <th>Product</th>
            <th>Qty</th>
            <th>Price</th>
          </tr>
        </thead>
        <tbody id="receipt_table_body">

        </tbody>
        <tfoot class="receipt_footer">
          <tr>
            <td colspan="2" class="receipt_total receipt_total_label">Total: </td>
            <td id="receipt_total" class="receipt_total receipt_total_value"></td>
          </tr>
        </tfoot>
      </table>

    </div>
  </div>


  <!-- ADD SALE DIALOG -->
  <dialog class="sale_dialog_overlay" id="sale_dialog">
    <div class="sale_dialog">

      <!-- LEFT PANEL: Product Selection -->
      <div class="sale_panel_left">

        <div class="sale_search_bar">
          <input type="text" class="sale_search_input" id="sale_search_input" placeholder="Search Products..." />
          <span class="sale_search_icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
          </span>
        </div>

        <div class="sale_product_grid" id="sale_product_grid">

        </div>
      </div>

      <!-- RIGHT PANEL: Current Sale -->
      <div class="sale_panel_right">

        <h2 class="sale_panel_title">Current Sale</h2>

        <!-- Cart Items — JS will populate this -->
        <div class="sale_cart" id="sale_cart">

        </div>

        <!-- Bottom Bar -->
        <div class="sale_bottom_bar">
          <div class="sale_totals">
            <span class="sale_total_price"><span>TOTAL: </span><span id="sale_total_price"></span></span>
            <span class="sale_total_profit"><span>Profit: </span><span id="sale_total_profit"></span></span>
          </div>
          <div class="sale_bottom_actions">
            <button class="dialog_btn dialog_cancel" id="sale_dialog_cancel">Cancel</button>
            <button class="dialog_btn dialog_create" id="sale_dialog_submit">Submit Sale</button>
          </div>
        </div>

      </div>
    </div>
  </dialog>



  <!-- HEADER / NAV -->
  <header class="site_header">
    <nav class="navbar">
      <div class="nav_brand">RETAIL BUDDY</div>
      <ul class="nav_links">
        <li><a href="dashboard.html" class="nav_link">HOME</a></li>
        <li><a href="sales.html" class="nav_link active">SALES</a></li>
        <li><a href="products.html" class="nav_link">PRODUCTS</a></li>
        <li><a href="tabular_analytics.html" class="nav_link">TABULAR ANALYTICS</a></li>
        <li><a href="graphical_analytics.html" class="nav_link">GRAPHICAL ANALYTICS</a></li>
      </ul>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="main_content">

    <div class="title_section">
      <h1 class="page_title">Today's Sales</h1>
      <btn class="add_btn" id="show_sale_dialog_btn">
        <span class="add_btn_icon">+</span>
        <span class="add_btn_label">Add Sale</span>
      </btn>
    </div>

    <div class="table_wrapper">
      <table class="data_table" id="sales_table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Time</th>
            <th>Products</th>
            <th id="price_header">Price</th>
            <th id="profit_header">Profit</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="sales_table_body">

        </tbody>
        <tfoot>
          <tr class="table_totals_row">
            <td colspan="3">TOTAL</td>
            <td id="sales_total_price"></td>
            <td id="sales_total_profit"></td>
            <td></td>
          </tr>
        </tfoot>
      </table>
    </div>
  </main>



  <!-- FOOTER -->
  <footer class="site_footer">
    <span class="footer_text">Retail Buddy | Semester Project | 2026</span>
  </footer>

</body>

</html>
