<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retail System — Products</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="javascript/products.js" defer></script>
</head>

<body>

  <!-- ADD PRODUCT DIALOG -->
  <dialog class="dialog_overlay" id="product_dialog">
    <div class="dialog">

      <h2 class="dialog_title">Add Product</h2>

      <!-- Wrapping around form to provide automatic validation-->
      <form id="create_product_form">

        <div class="dialog_body">

          <div class="dialog_field">
            <label class="dialog_label" for="product_name">Name</label>
            <input class="dialog_input" type="text" id="product_name" placeholder="Name of the product" required />
          </div>

          <div class="dialog_field">
            <label class="dialog_label" for="product_price">Price</label>
            <input class="dialog_input" type="number" id="product_price" placeholder="Selling price" min="0" step="any"
              required />
          </div>

          <div class="dialog_field">
            <label class="dialog_label" for="product_cost">Cost</label>
            <input class="dialog_input" type="number" id="product_cost" placeholder="Buying cost" min="0" step="any"
              required />
          </div>

          <div class="dialog_field">
            <label class="dialog_label" for="product_stock">Stock</label>
            <input class="dialog_input" type="number" id="product_stock" placeholder="Stock available" min="0"
              step="1" required />
          </div>

        </div>

        <div class="dialog_actions">
          <button class="dialog_btn dialog_cancel" id="product_dialog_cancel" type="button">Cancel</button>
          <button class="dialog_btn dialog_create" id="product_dialog_create" type="submit">Create</button>
        </div>

      </form>

    </div>
  </dialog>

  <!-- NAV -->
  <header class="site_header">
    <nav class="navbar">
      <div class="nav_brand">RETAIL BUDDY</div>
      <ul class="nav_links">
        <li><a href="index.html" class="nav_link">HOME</a></li>
        <li><a href="sales.html" class="nav_link">SALES</a></li>
        <li><a href="products.html" class="nav_link active">PRODUCTS</a></li>
        <li><a href="tabular_analytics.html" class="nav_link">TABULAR ANALYTICS</a></li>
        <li><a href="graphs.html" class="nav_link">GRAPHS</a></li>
      </ul>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="main_content">

    <div class="title_section">
      <h1 class="page_title">Products</h1>
      <btn class="add_btn" id="show_product_dialog_btn">
        <span class="add_btn_icon">+</span>
        <span class="add_btn_label">Add Product</span>
      </btn>
    </div>


    <div class="table_wrapper">
      <table class="data_table" id="product_table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Profit</th>
            <th>Stock</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="product_table_body">

        </tbody>
      </table>
    </div>
  </main>

  <!-- PRODUCT DIALOG -->


  <!-- FOOTER -->
  <footer class="site_footer">
    <span class="footer_text">Retail Buddy | Semester Project | 2026</span>
  </footer>

</body>

</html>
