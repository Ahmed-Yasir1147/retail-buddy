<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retail System — Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="javascript/static_login.js" defer></script>
</head>
<body class="login_body">

  <div class="login_wrapper">

    <div class="login_card">

      <h1 class="login_brand">RETAIL BUDDY</h1>
      <p class="login_subtitle">Sign in to your account</p>

      <div class="login_fields">

        <div class="dialog_field">
          <label class="dialog_label" for="login_email">Email</label>
          <input
            class="dialog_input"
            type="email"
            id="login_email"
            placeholder="Enter your gmail"
          />
        </div>

        <div class="dialog_field">
          <label class="dialog_label" for="login_password">Password</label>
          <input
            class="dialog_input"
            type="password"
            id="login_password"
            placeholder="Enter your password"
          />
        </div>

      </div>

      <div class="incorrect_cred" id="incorrect_cred" di>Wrong email or password!</div>

      <button class="login_btn" id="login_submit">Sign In</button>

    </div>

  </div>

  <footer class="site_footer">
    <span class="footer_text">Retail Buddy | Semester Project | 2026</span>
  </footer>

</body>
</html>
