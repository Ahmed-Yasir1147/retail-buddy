<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retail System — Graphs</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="javascript/graphical_analytics.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- HEADER / NAV -->
  <header class="site_header">
    <nav class="navbar">
      <div class="nav_brand">RETAIL SYSTEM</div>
      <ul class="nav_links">
        <li><a href="index.html" class="nav_link">HOME</a></li>
        <li><a href="sales.html" class="nav_link">SALES</a></li>
        <li><a href="products.html" class="nav_link">PRODUCTS</a></li>
        <li><a href="tabular_analytics.html" class="nav_link">TABULAR ANALYTICS</a></li>
        <li><a href="graphs.html" class="nav_link active">GRAPHICAL ANALYTICS</a></li>
      </ul>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="main_content">

    <!-- FILTER BAR -->
    <div class="filter_bar">

      <div class="filter_left">
        <select class="filter_select" id="graph_timerange">
          <option value="lifetime">Lifetime</option>
          <option value="yearly">Yearly</option>
          <option value="monthly">Monthly</option>
        </select>
      </div>

      <div class="filter_right">
        <select class="filter_select filter_teal" id="graph_year">
          
        </select>

        <select class="filter_select filter_teal" id="graph_month">
          <option value="1">January</option>
          <option value="2">February</option>
          <option value="3">March</option>
          <option value="4">April</option>
          <option value="5">May</option>
          <option value="6">June</option>
          <option value="7">July</option>
          <option value="8">August</option>
          <option value="9">September</option>
          <option value="10">October</option>
          <option value="11">November</option>
          <option value="12">December</option>
        </select>
      </div>

    </div>

    <!-- GRAPH AREA -->
    <div class="graph_card" id="graph_card">
      <canvas id="graph_canvas"></canvas>
    </div>

  </main>

  <!-- FOOTER -->
    <footer class="site_footer">
        <span class="footer_text">Retail Buddy | Semester Project | 2026</span>
    </footer>

</body>
</html>
