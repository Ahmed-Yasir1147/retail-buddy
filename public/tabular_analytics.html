<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retail System — Tabular Analytics</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="javascript/tabular_analytics.js" type="module" defer></script>
</head>

<body>

  <!-- NAV -->
  <header class="site_header">
    <nav class="navbar">
      <div class="nav_brand">RETAIL BUDDY</div>
      <ul class="nav_links">
        <li><a href="dashboard.html" class="nav_link">HOME</a></li>
        <li><a href="sales.html" class="nav_link">SALES</a></li>
        <li><a href="products.html" class="nav_link">PRODUCTS</a></li>
        <li><a href="tabular_analytics.html" class="nav_link active">TABULAR ANALYTICS</a></li>
        <li><a href="graphical_analytics.html" class="nav_link">GRAPHICAL ANALYTICS</a></li>
      </ul>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="main_content">

    <!-- FILTER BAR -->
    <div class="filter_bar">

      <!-- Time Range Dropdown (left) -->
      <div class="filter_left">
        <select class="filter_select filter_timerange" id="analytics_timerange">
          <option value="lifetime" selected>Lifetime</option>
          <option value="yearly">Yearly</option>
          <option value="monthly">Montly</option>
          <option value="daily">Daily</option>
        </select>
      </div>

      <!-- Year / Month / Day Dropdowns (right) -->
      <div class="filter_right">
        <select class="filter_select filter_time" id="analytics_year">

        </select>

        <select class="filter_select filter_time" id="analytics_month">
          <option value="1">January</option>
          <option value="2">February</option>
          <option value="3">March</option>
          <option value="4">April</option>
          <option value="5">May</option>
          <option value="6">June</option>
          <option value="7">July</option>
          <option value="8">August</option>
          <option value="9">September</option>
          <option value="10">October</option>
          <option value="11">November</option>
          <option value="12">December</option>
        </select>

        <select class="filter_select filter_time" id="analytics_day">
        </select>
      </div>

    </div>

    <!-- TABLE -->
    <div class="table_wrapper">
      <table class="data_table" id="analytics_table">
        <thead>
          <tr id="analytics_table_head">

          </tr>
        </thead>
        <tbody id="analytics_table_body">


        </tbody>

        <!-- TOTALS ROW -->
        <tfoot>
          <tr class="table_totals_row" id="table_totals_row">

          </tr>
        </tfoot>

      </table>
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="site_footer">
    <span class="footer_text">Retail Buddy | Semester Project | 2026</span>
  </footer>

</body>

</html>
